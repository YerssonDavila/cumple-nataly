<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti ❤️</title>

<style>
body {
    margin: 0;
    background: #0d0d0d;
    color: white;
    text-align: center;
    font-family: Arial;
    overflow: hidden;
}

/* Pantalla inicial */
#inicio {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
}

#inicio button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
}

/* contenido oculto */
#contenido {
    display: none;
    padding: 20px;
}

img {
    width: 250px;
    margin: 15px;
    border-radius: 12px;
    opacity: 0;
    transition: opacity 2s;
}

/* flores */
.flower {
    position: fixed;
    font-size: 24px;
    animation: fall 6s linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10%); }
    100% { transform: translateY(110vh); }
}
</style>
</head>

<body>

<!-- Pantalla inicial -->
<div id="inicio">
    <button onclick="iniciar()">Abre tu sorpresa ❤️</button>
</div>

<!-- Contenido -->
<div id="contenido">
    <h1>Feliz Cumpleaños 🎂❤️</h1>
    <h2>Nataly Brighi 🌷</h2>

    <p>
        Hoy celebro tu vida… ✨ <br>
        Gracias por hacerme tan feliz 💖 <br>
        Te amo muchísimo ❤️
    </p>

 <div style="display: flex; justify-content: center; margin-bottom:20px;">
    <img src="Img4.jpeg" id="img4">
    <img src="Img2.jpeg" id="img2">
    <img src="Img3.jpeg" id="img3">
</div>

<div style="display: flex; justify-content: center;">
    <img src="Img5.jpeg" id="img5">
    <img src="Img6.jpeg" id="img6">
    <img src="Img7.jpeg" id="img7">
</div>

    <br>
    <!-- iframe para música -->
    <audio id="musica" preload="auto">
    <source src="cancion.mp3" type="audio/mpeg">
</audio>
  
</div>

<script>

function iniciar() {
    document.getElementById("inicio").style.display = "none";
    document.getElementById("contenido").style.display = "block";

    // reproducir música
   
 const audio = document.getElementById("musica");
    audio.play().catch(()=>{});

    
    // mostrar imágenes en secuencia
    setTimeout(() => document.getElementById("img4").style.opacity = 1, 1000);
    setTimeout(() => document.getElementById("img2").style.opacity = 1, 2500);
    setTimeout(() => document.getElementById("img3").style.opacity = 1, 4000);
     setTimeout(() => document.getElementById("img5").style.opacity = 1, 5500);
    setTimeout(() => document.getElementById("img6").style.opacity = 1, 7000);
    setTimeout(() => document.getElementById("img7").style.opacity = 1, 8500);

    
}

// flores
function crearFlor() {
    const flower = document.createElement("div");
    flower.className = "flower";

    const flores = ["🌷", "🌹", "💐"];
    flower.innerText = flores[Math.floor(Math.random()*flores.length)];

    flower.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(flower);

    setTimeout(() => flower.remove(), 6000);
}

setInterval(crearFlor, 400);

</script>

</body>
</html>
